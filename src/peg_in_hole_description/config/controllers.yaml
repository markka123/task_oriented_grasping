# Prevent the arm from falling under gravity before ros2_control controllers
# claim the joints.  gazebo_ros2_control 0.4.x defaults hold_joints to false;
# setting it here (top-level, read by the plugin's own ROS node) forces the
# GazeboSystem to call SetPosition() every physics step at the initial_value
# until a trajectory controller takes over.
hold_joints: true

controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    force_torque_sensor_broadcaster:
      type: ur_controllers/ForceTorqueStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# ── UR arm controllers ────────────────────────────────────────────────────────

speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: tool0
    topic_name: /ft_data

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:  { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      elbow_joint:         { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint:       { trajectory: 0.2, goal: 0.1 }

scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint:  { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      elbow_joint:         { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint:       { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint:       { trajectory: 0.2, goal: 0.1 }

# ── Robotiq 2F-85 gripper controller ─────────────────────────────────────────
# Controls all 6 position-commanded DOFs from mock hardware.
# Mimic multipliers are applied explicitly in grasp_and_insert.py when
# building trajectories, since mock_components/GenericSystem does not
# enforce URDF mimic relationships.

gripper_controller:
  ros__parameters:
    joints:
      - robotiq_85_left_knuckle_joint
      - robotiq_85_right_knuckle_joint
      - robotiq_85_left_inner_knuckle_joint
      - robotiq_85_right_inner_knuckle_joint
      - robotiq_85_left_finger_tip_joint
      - robotiq_85_right_finger_tip_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 3.0
